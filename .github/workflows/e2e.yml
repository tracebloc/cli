name: Integration (e2e)

# Spins a kind cluster and runs the build-tagged `integration` suite,
# which exercises the real-I/O seams the unit tests mock out:
# kubeconfig->clientset connectivity and the SPDYExecutor tar-over-exec
# stream against a live Pod + PVC (internal/push.SPDYExecutor.Exec is
# 0% in unit coverage — this is where every live bug actually lived).
#
# Heavy (kind boot + image pulls), so it does NOT run on every PR:
#   - nightly (schedule)
#   - manual (workflow_dispatch)
#   - on a PR only when it carries the `e2e` label

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration:
    timeout-minutes: 30
    name: Integration (kind)
    runs-on: ubuntu-latest
    # Skip on PRs that aren't explicitly opted in via the `e2e` label;
    # always run on schedule / manual dispatch.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Boots a single-node kind cluster and points $KUBECONFIG at it,
      # which the integration suite picks up via cluster.Load's default
      # kubeconfig resolution. kind ships a default StorageClass
      # (local-path), so the test's PVC binds.
      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0

      - name: Integration tests
        run: make test-integration

  # Offboard teardown e2e (cli#140): builds the real `tracebloc` binary and runs
  # `tracebloc delete --yes --force` black-box against a throwaway k3d cluster
  # with a real Helm release installed, asserting the offboard REVOKES (not
  # deletes) the credential, uninstalls the release, deletes the k3d cluster,
  # wipes ~/.tracebloc, and leaves a foreign `tb` alias in place (#171). k3d —
  # not kind — because the CLI's teardown shells out to `k3d cluster delete`.
  delete-teardown:
    timeout-minutes: 20
    name: Offboard teardown (k3d)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # k3d (the cluster the CLI tears down) + helm (the release it uninstalls).
      # docker is preinstalled on ubuntu-latest. The test creates the throwaway
      # cluster itself, so only the binaries are needed here.
      - name: Install k3d
        run: curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/v5.7.4/install.sh | TAG=v5.7.4 bash

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Offboard teardown e2e
        env:
          TB_E2E_K3D: "1"
        run: go test -tags integration -count=1 -timeout 15m -v -run 'TestE2E_Delete|TestE2E_Revoke' ./test/integration/...
