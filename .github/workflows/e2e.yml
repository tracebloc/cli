name: Integration (e2e)

# Spins a kind cluster and runs the build-tagged `integration` suite,
# which exercises the real-I/O seams the unit tests mock out:
# kubeconfig->clientset connectivity and the SPDYExecutor tar-over-exec
# stream against a live Pod + PVC (internal/push.SPDYExecutor.Exec is
# 0% in unit coverage — this is where every live bug actually lived).
#
# Heavy (kind boot + image pulls), so it does NOT run on every PR:
#   - on every push to develop
#   - nightly (schedule)
#   - manual (workflow_dispatch)
#   - on a PR that touches paths the suites exercise (the `changes` job
#     below decides), or that carries the `e2e` label (manual opt-in)
#
# The push trigger exists because scheduled workflows always execute the
# DEFAULT branch's tree (main), which trails develop by dozens of commits —
# discovery_e2e_test.go, delete_e2e_test.go, and the delete-teardown job
# don't exist on main, so the nightly never actually ran them (#293).
# Running on develop pushes exercises the tree the tests were written for.
#
# The paths auto-opt-in exists because label-only gating relies on authors
# remembering the label: #363/#367/#368 reworded the `tracebloc delete`
# teardown copy the offboard e2e asserts on, no PR run ever executed the
# suite, and every develop push went red until #378 realigned the
# assertions. PRs touching the offboard flow, the rendering layer, or the
# suites themselves now run the e2e pre-merge (~2 min, both jobs in
# parallel); unrelated PRs still skip it after a ~5s paths probe.

on:
  push:
    branches: [develop]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # PR-only paths probe (~5s): did this PR touch anything the e2e suites
  # actually exercise? dorny/paths-filter reads the PR's changed files via
  # the GitHub API — no checkout — which is why the job needs
  # pull-requests:read (the workflow-level `contents: read` zeroes it).
  #
  # Push/schedule/dispatch runs skip this job, so the two e2e jobs guard
  # their `needs` with !cancelled(): a custom `if` without a status
  # function gets an implicit success(), and success() is false when a
  # needed job was skipped — the push/nightly runs would silently skip too.
  changes:
    timeout-minutes: 5
    name: Detect e2e-relevant changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Union of both suites' dependency surface. Kind suite: the
          # clientset/discovery + SPDY-exec seams. Offboard (k3d) suite:
          # everything the black-box `tracebloc delete` run renders and
          # executes — including internal/ui, because #367 (style system)
          # broke the copy assertions without touching delete.go. The glob
          # internal/cli/delete*.go deliberately excludes data_delete*.go
          # (`tracebloc data delete` is a different command, unit-tested).
          filters: |
            e2e:
              - '.github/workflows/e2e.yml'
              - 'Makefile'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'test/integration/**'
              - 'internal/cli/delete*.go'
              - 'internal/nodeboot/**'
              - 'internal/api/**'
              - 'internal/config/**'
              - 'internal/ui/**'
              - 'internal/cluster/**'
              - 'internal/push/**'

  integration:
    timeout-minutes: 30
    name: Integration (kind)
    runs-on: ubuntu-latest
    needs: changes
    # Always run on push / schedule / manual dispatch; on PRs only when the
    # paths probe matched or the PR is opted in via the `e2e` label.
    if: >-
      !cancelled() &&
      (github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e') ||
      needs.changes.outputs.e2e == 'true')
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Boots a single-node kind cluster and points $KUBECONFIG at it,
      # which the integration suite picks up via cluster.Load's default
      # kubeconfig resolution. kind ships a default StorageClass
      # (local-path), so the test's PVC binds.
      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      # Run the unit suite + the integration suite each under coverage, then merge
      # them (go tool covdata). The merge credits the real-cluster I/O seams —
      # cluster.NewClientset, push.SPDYExecutor.Exec, submit.PortForwardJobsManager,
      # cluster.DiscoverInClusterClient — which are 0% in the unit suite by design
      # but exercised here, so submit/cluster reflect their true coverage.
      # cover-integration IS the integration gate: it fails the job if a test fails.
      - name: Unit coverage
        run: make cover

      - name: Integration tests (under coverage)
        run: make cover-integration

      - name: Merged coverage — credits the real-cluster I/O seams
        run: make cover-merge

  # Offboard teardown e2e (cli#140): builds the real `tracebloc` binary and runs
  # `tracebloc delete --yes --force` black-box against a throwaway k3d cluster
  # with a real Helm release installed, asserting the offboard REVOKES (not
  # deletes) the credential, uninstalls the release, deletes the k3d cluster,
  # wipes ~/.tracebloc, and leaves a foreign `tb` alias in place (#171). k3d —
  # not kind — because the CLI's teardown shells out to `k3d cluster delete`.
  delete-teardown:
    timeout-minutes: 20
    name: Offboard teardown (k3d)
    runs-on: ubuntu-latest
    needs: changes
    # Same gate as the kind job: push/schedule/dispatch always; PRs via the
    # paths probe or the `e2e` label. This is the job #363/#367/#368 needed
    # pre-merge (~1-2 min).
    if: >-
      !cancelled() &&
      (github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e') ||
      needs.changes.outputs.e2e == 'true')
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # k3d (the cluster the CLI tears down) + helm (the release it uninstalls).
      # docker is preinstalled on ubuntu-latest. The test creates the throwaway
      # cluster itself, so only the binaries are needed here.
      - name: Install k3d
        run: curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/v5.7.4/install.sh | TAG=v5.7.4 bash

      - name: Install helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: Offboard teardown e2e
        env:
          TB_E2E_K3D: "1"
        run: go test -tags integration -count=1 -timeout 15m -v -run 'TestE2E_Delete|TestE2E_Revoke' ./test/integration/...
